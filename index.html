<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>プリンセスがくしゅう ✨</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #f9a8d4;
    --pink-deep: #ec4899;
    --purple: #c084fc;
    --purple-deep: #9333ea;
    --gold: #fbbf24;
    --cream: #fdf2f8;
  }

  * { margin:0; padding:0; box-sizing:border-box; touch-action:none; }

  body {
    width:100vw; height:100vh; overflow:hidden;
    background: linear-gradient(135deg,#fce7f3 0%,#f3e8ff 45%,#fdf2f8 70%,#fce7f3 100%);
    font-family:'Zen Maru Gothic','ヒラギノ丸ゴ Pro','BIZ UDPGothic',sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
    padding-top: max(8px, env(safe-area-inset-top));
    position:relative; gap:0;
  }

  /* 背景デコ */
  .bg-deco { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .star { position:absolute; animation:twinkle 3s ease-in-out infinite; opacity:0.35; }
  @keyframes twinkle { 0%,100%{opacity:0.15;transform:scale(1);} 50%{opacity:0.65;transform:scale(1.3);} }

  /* タブ切り替え */
  .tab-bar {
    position:relative; z-index:10;
    display:flex; gap:6px; margin:6px 0 4px;
  }
  .tab-btn {
    background:rgba(255,255,255,0.55);
    border:2px solid rgba(192,132,252,0.3);
    border-radius:50px;
    padding:4px 16px;
    font-family:'Zen Maru Gothic','ヒラギノ丸ゴ Pro','BIZ UDPGothic',sans-serif;
    font-size:0.82rem; font-weight:700;
    color:var(--purple-deep); cursor:pointer;
    transition:all 0.2s; backdrop-filter:blur(4px);
  }
  .tab-btn.active {
    background:linear-gradient(135deg,var(--pink-deep),var(--purple-deep));
    color:#fff; border-color:transparent;
    box-shadow:0 4px 14px rgba(147,51,234,0.35);
  }

  /* ナビグリッド */
  .nav-scroll {
    position:relative; z-index:10;
    width:95vw; max-width:460px;
    overflow-x:auto; overflow-y:hidden;
    margin-bottom:4px;
    scrollbar-width:none;
  }
  .nav-scroll::-webkit-scrollbar { display:none; }
  .nav-grid {
    display:flex; flex-wrap:wrap; justify-content:center; gap:4px;
    padding:2px 0;
  }
  .nav-btn {
    min-width:34px; height:34px; padding:0 6px;
    border-radius:50px;
    border:2px solid rgba(236,72,153,0.3);
    background:rgba(255,255,255,0.6);
    font-family:'Zen Maru Gothic','ヒラギノ丸ゴ Pro','BIZ UDPGothic',sans-serif;
    font-size:0.88rem; font-weight:700;
    color:var(--purple-deep); cursor:pointer;
    transition:all 0.18s; backdrop-filter:blur(4px);
    white-space:nowrap;
  }
  .nav-btn:hover,.nav-btn.active {
    background:linear-gradient(135deg,var(--pink),var(--purple));
    color:#fff; border-color:transparent;
    transform:scale(1.13);
    box-shadow:0 4px 14px rgba(192,132,252,0.5);
  }
  .nav-btn.done {
    background:linear-gradient(135deg,#fbbf24,#f59e0b);
    color:#fff; border-color:transparent;
  }
  .nav-btn.active.done {
    background:linear-gradient(135deg,var(--pink),var(--purple));
  }

  /* キャンバスエリア */
  .canvas-wrap {
    position:relative; z-index:10;
    display:flex; flex-direction:column; align-items:center; gap:6px;
  }

  .canvas-frame {
    position:relative;
    width:min(52vw,260px); height:min(52vw,260px);
    background:rgba(255,255,255,0.72);
    border-radius:32px;
    border:3px solid rgba(236,72,153,0.3);
    box-shadow: 0 0 0 5px rgba(192,132,252,0.13), 0 18px 55px rgba(192,132,252,0.22), inset 0 2px 4px rgba(255,255,255,0.85);
    overflow:hidden; backdrop-filter:blur(8px);
  }

  .char-guide {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    font-size:min(40vw,200px); font-weight:900;
    color:rgba(236,72,153,0.07);
    user-select:none; pointer-events:none; z-index:1; line-height:1;
  }

  #drawCanvas {
    position:absolute; inset:0; border-radius:30px; z-index:2; cursor:crosshair;
  }
  .sparkle-canvas {
    position:absolute; inset:0; z-index:3; pointer-events:none;
    border-radius:30px; opacity:0; transition:opacity 0.3s;
  }
  .sparkle-canvas.show { opacity:1; animation:sparkleAnim 1.5s ease-out; }
  @keyframes sparkleAnim { 0%{opacity:0;} 20%{opacity:1;} 100%{opacity:0;} }

  /* ボタン行 */
  .btn-row {
    display:flex; gap:8px; align-items:center;
  }
  .btn-base {
    border-radius:50px; padding:7px 20px;
    font-family:'Zen Maru Gothic','ヒラギノ丸ゴ Pro','BIZ UDPGothic',sans-serif;
    font-size:0.85rem; font-weight:700;
    cursor:pointer; transition:all 0.2s;
    border:2px solid transparent;
  }
  .btn-clear {
    background:linear-gradient(135deg,#fce7f3,#f3e8ff);
    border-color:rgba(192,132,252,0.4);
    color:var(--purple-deep);
    box-shadow:0 3px 10px rgba(192,132,252,0.18);
  }
  .btn-clear:hover {
    background:linear-gradient(135deg,var(--pink),var(--purple));
    color:#fff; border-color:transparent; transform:scale(1.05);
  }
  .btn-done {
    background:linear-gradient(135deg,var(--pink-deep),var(--purple-deep));
    color:#fff;
    box-shadow:0 5px 18px rgba(147,51,234,0.35);
    opacity:0.45; pointer-events:none;
    transition:all 0.25s;
  }
  .btn-done.active-btn {
    opacity:1; pointer-events:all;
    animation:pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100%{box-shadow:0 5px 18px rgba(147,51,234,0.35);}
    50%{box-shadow:0 8px 28px rgba(147,51,234,0.65), 0 0 0 6px rgba(236,72,153,0.2);}
  }
  .btn-done:hover.active-btn { transform:scale(1.06); }

  /* 単語ヒント */
  .word-hint {
    position:relative; z-index:10;
    min-height:38px; display:flex; align-items:center; justify-content:center; gap:6px;
    margin-top:2px;
  }
  .word-bubble {
    background:linear-gradient(135deg,rgba(255,255,255,0.92),rgba(253,242,248,0.92));
    border:2px solid rgba(236,72,153,0.25);
    border-radius:50px; padding:6px 22px;
    font-size:clamp(0.95rem,3.2vw,1.15rem); font-weight:700; color:var(--purple-deep);
    box-shadow:0 4px 14px rgba(192,132,252,0.2); backdrop-filter:blur(4px);
    animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    display:flex; align-items:center; gap:8px;
  }
  /* 数字の単位バッジ */
  .unit-row {
    display:flex; gap:5px; flex-wrap:wrap; justify-content:center;
  }
  .unit-badge {
    background:rgba(255,255,255,0.85);
    border:2px solid rgba(192,132,252,0.35);
    border-radius:50px; padding:4px 14px;
    font-size:0.82rem; font-weight:700; color:var(--purple-deep);
    animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn { from{transform:scale(0.5);opacity:0;} to{transform:scale(1);opacity:1;} }

  /* 完成オーバーレイ */
  .complete-msg {
    position:fixed; inset:0; z-index:100;
    display:flex; align-items:center; justify-content:center;
    background:rgba(252,231,243,0.4); backdrop-filter:blur(8px);
    opacity:0; pointer-events:none; transition:opacity 0.3s;
  }
  .complete-msg.show { opacity:1; pointer-events:all; }
  .complete-card {
    background:linear-gradient(135deg,#fff,#fdf2f8);
    border:3px solid rgba(236,72,153,0.3);
    border-radius:32px; padding:28px 36px; text-align:center;
    box-shadow:0 28px 75px rgba(192,132,252,0.3);
    animation:cardPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
    max-width:90vw;
  }
  @keyframes cardPop { from{transform:scale(0.6) rotate(-5deg);opacity:0;} to{transform:scale(1) rotate(0deg);opacity:1;} }
  .complete-char { font-size:clamp(3.5rem,12vw,5rem); line-height:1.15; }
  .complete-label {
    font-size:1.2rem; font-weight:900;
    background:linear-gradient(90deg,var(--pink-deep),var(--purple-deep));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    margin:6px 0;
  }
  .complete-word { font-size:1.6rem; font-weight:900; color:var(--purple-deep); margin:6px 0; }
  /* 数字の完成単位 */
  .complete-units { font-size:1rem; color:#a855f7; margin:4px 0 8px; }
  .next-btn {
    margin-top:14px;
    background:linear-gradient(135deg,var(--pink-deep),var(--purple-deep));
    color:#fff; border:none; border-radius:50px;
    padding:10px 32px;
    font-family:'Zen Maru Gothic','ヒラギノ丸ゴ Pro','BIZ UDPGothic',sans-serif;
    font-size:1rem; font-weight:700; cursor:pointer;
    box-shadow:0 8px 24px rgba(147,51,234,0.35); transition:transform 0.2s;
  }
  .next-btn:hover { transform:scale(1.05); }

  /* パーティクル */
  .particle {
    position:fixed; pointer-events:none; z-index:200;
    animation:floatUp 1.5s ease-out forwards;
  }
  @keyframes floatUp { from{transform:translateY(0) scale(1);opacity:1;} to{transform:translateY(-180px) scale(0.3);opacity:0;} }

  /* タイトル */
  .title {
    position:relative; z-index:10;
    font-size:clamp(0.9rem,3.5vw,1.25rem); font-weight:900; letter-spacing:0.08em;
    background:linear-gradient(90deg,var(--pink-deep),var(--purple-deep),var(--gold));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    filter:drop-shadow(0 2px 4px rgba(236,72,153,0.25));
    margin-bottom:2px; margin-top:2px;
  }
</style>
</head>
<body>

<div class="title">👑 プリンセスがくしゅう 👑</div>

<!-- タブ -->

  <button class="tab-btn active" id="tab-hira" onclick="switchTab('hira')">ひらがな</button>

  <button class="tab-btn" id="tab-alpha" onclick="switchTab('alpha')">アルファベット</button>
</div>

<!-- ナビ -->
<div class="nav-scroll"><div class="nav-grid" id="navGrid"></div></div>

<!-- キャンバス -->

  <div class="canvas-frame">
    <div class="char-guide" id="charGuide">あ</div>
    <canvas id="drawCanvas"></canvas>
    <canvas class="sparkle-canvas" id="sparkleCanvas"></canvas>
  </div>
  <div class="btn-row">
    <button class="btn-base btn-clear" onclick="clearCanvas()">🌸 もういちど</button>
    <button class="btn-base btn-done" id="btnDone" onclick="onDone()">✨ かんせい！</button>
  </div>
</div>

<!-- 単語ヒント -->
<div class="word-hint" id="wordHint"></div>

<!-- 完成オーバーレイ -->
<div class="complete-msg" id="completeMsg">
  <div class="complete-card">
    <div class="complete-char" id="completeChar">あ</div>
    <div class="complete-label">✨ じょうずにかけたよ！✨</div>
    <div class="complete-word" id="completeWord">🍎 りんご</div>
    <div class="complete-units" id="completeUnits"></div>
    <button class="next-btn" onclick="nextChar()">つぎへ ➡️</button>
  </div>
</div>

  {char:'N',word:'Nest',emoji:'🪺',read:'えん、ねすと',soundLang:'en-US',soundText:'N, Nest'},
  {char:'O',word:'Orange',emoji:'🍊',read:'おー、おれんじ',soundLang:'en-US',soundText:'O, Orange'},
  {char:'P',word:'Princess',emoji:'👑',read:'ぴー、ぷりんせす',soundLang:'en-US',soundText:'P, Princess'},
  {char:'Q',word:'Queen',emoji:'👸',read:'きゅー、くいーん',soundLang:'en-US',soundText:'Q, Queen'},
  {char:'R',word:'Rainbow',emoji:'🌈',read:'あーる、れいんぼー',soundLang:'en-US',soundText:'R, Rainbow'},
  {char:'S',word:'Star',emoji:'⭐',read:'えす、すたー',soundLang:'en-US',soundText:'S, Star'},
  {char:'T',word:'Tiger',emoji:'🐯',read:'てぃー、たいがー',soundLang:'en-US',soundText:'T, Tiger'},
  {char:'U',word:'Unicorn',emoji:'🦄',read:'ゆー、ゆにこーん',soundLang:'en-US',soundText:'U, Unicorn'},
  {char:'V',word:'Violet',emoji:'💜',read:'ぶい、ばいおれっと',soundLang:'en-US',soundText:'V, Violet'},
  {char:'W',word:'Whale',emoji:'🐳',read:'だぶりゅー、ホエール、クジラ',soundLang:'en-US',soundText:'W, Whale'},
  {char:'X',word:'Xylophone',emoji:'🎵',read:'えっくす、ざいろふぉん',soundLang:'en-US',soundText:'X, Xylophone'},
  {char:'Y',word:'Yogurt',emoji:'🍶',read:'わい、よーぐると',soundLang:'en-US',soundText:'Y, Yogurt'},
  {char:'Z',word:'Zebra',emoji:'🦓',read:'ぜっと、ぜぶら',soundLang:'en-US',soundText:'Z, Zebra'},
];

// ===== 状態 =====
let currentTab = 'hira'; // 'hira' | 'num' | 'alpha'
let currentIdx = 0;
let isDrawing = false;
let paths = [];
let currentPath = [];
let hasDrawn = false;
let doneSets = { hira: new Set(), num: new Set(), alpha: new Set() };

function currentData() {
  if (currentTab === 'hira') return GOJUON;
  if (currentTab === 'num')  return NUMBERS;
  return ALPHABET;
}

function currentItem() { return currentData()[currentIdx]; }

// ===== タブ切り替え =====
function switchTab(tab) {
  currentTab = tab;
  currentIdx = 0;
  ['hira','num','alpha'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t === tab);
  });
  clearCanvas();
  buildNav();
  updateGuide();
  document.getElementById('wordHint').innerHTML = '';
}

// ===== ナビ =====
function buildNav() {
  const grid = document.getElementById('navGrid');
  grid.innerHTML = '';
  const doneSet = doneSets[currentTab];
  currentData().forEach((item, i) => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn'
      + (i === currentIdx ? ' active' : '')
      + (doneSet.has(i) ? ' done' : '');
    btn.textContent = item.char;
    btn.onclick = () => selectChar(i);
    grid.appendChild(btn);
  });
}

function selectChar(idx) {
  currentIdx = idx;
  clearCanvas();
  buildNav();
  updateGuide();
  document.getElementById('wordHint').innerHTML = '';
}

function updateGuide() {
  document.getElementById('charGuide').textContent = currentItem().char;
}

// ===== 描画 =====
const canvas = document.getElementById('drawCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const frame = canvas.parentElement;
  const size = frame.clientWidth;
  canvas.width = size; canvas.height = size;
  const sc = document.getElementById('sparkleCanvas');
  sc.width = size; sc.height = size;
  redrawPaths();
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX - rect.left, y: src.clientY - rect.top };
}

function startDraw(e) {
  e.preventDefault();
  isDrawing = true;
  currentPath = [getPos(e)];
}

function moveDraw(e) {
  e.preventDefault();
  if (!isDrawing) return;
  currentPath.push(getPos(e));
  hasDrawn = true;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  redrawPaths();
  drawPath(currentPath, ctx);
  // かんせいボタンを有効化
  if (hasDrawn) document.getElementById('btnDone').classList.add('active-btn');
}

function endDraw(e) {
  e.preventDefault();
  if (!isDrawing) return;
  isDrawing = false;
  if (currentPath.length > 1) paths.push([...currentPath]);
  currentPath = [];
  if (hasDrawn) document.getElementById('btnDone').classList.add('active-btn');
}

function drawPath(path, context) {
  if (path.length < 2) return;
  context.beginPath();
  context.moveTo(path[0].x, path[0].y);
  for (let i = 1; i < path.length; i++) context.lineTo(path[i].x, path[i].y);
  context.strokeStyle = 'rgba(147,51,234,0.72)';
  context.lineWidth = Math.max(canvas.width * 0.044, 7);
  context.lineCap = 'round'; context.lineJoin = 'round';
  context.shadowColor = 'rgba(192,132,252,0.85)'; context.shadowBlur = 14;
  context.stroke();
  context.shadowBlur = 0;
}

function redrawPaths() { paths.forEach(p => drawPath(p, ctx)); }

function clearCanvas() {
  paths = []; currentPath = []; hasDrawn = false;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  document.getElementById('btnDone').classList.remove('active-btn');
  document.getElementById('wordHint').innerHTML = '';
}

// ===== かんせいボタン =====
function onDone() {
  if (!hasDrawn) return;
  const item = currentItem();
  showSparkle();
  doneSets[currentTab].add(currentIdx);
  buildNav();

  if (currentTab === 'hira') {
    showHiraHint(item);
    speak(item.read, 'ja-JP');
  } else if (currentTab === 'num') {
    showNumHint(item);
    speakNum(item);
  } else {
    showAlphaHint(item);
    speakAlpha(item);
  }

  setTimeout(() => {
    showCompleteOverlay(item);
    launchParticles();
  }, 700);
}

// ===== ヒント表示 =====
function showHiraHint(item) {
  document.getElementById('wordHint').innerHTML = `
    <div class="word-bubble">
      <span style="font-size:1.4rem">${item.emoji}</span>
      <span>${item.word}</span>
    </div>`;
}

function showNumHint(item) {
  if (!item.units || item.units.length === 0) {
    document.getElementById('wordHint').innerHTML = `<div class="word-bubble"><span>${item.emoji}</span><span>${item.char}</span></div>`;
    return;
  }
  const badges = item.units.map(u =>
    `<div class="unit-badge">${u.emoji} ${item.char}${u.unit}の${u.item}</div>`
  ).join('');
  document.getElementById('wordHint').innerHTML = `<div class="unit-row">${badges}</div>`;
}

function showAlphaHint(item) {
  document.getElementById('wordHint').innerHTML = `
    <div class="word-bubble">
      <span style="font-size:1.4rem">${item.emoji}</span>
      <span>${item.word}</span>
    </div>`;
}

// ===== 完成オーバーレイ =====
function showCompleteOverlay(item) {
  document.getElementById('completeChar').textContent = item.char;

  if (currentTab === 'hira') {
    document.getElementById('completeWord').textContent = item.emoji + ' ' + item.word;
    document.getElementById('completeUnits').textContent = '';
  } else if (currentTab === 'num') {
    document.getElementById('completeWord').textContent = item.emoji + ' ' + item.char;
    if (item.units && item.units.length > 0) {
      document.getElementById('completeUnits').textContent =
        item.units.map(u => `${u.emoji}${item.char}${u.unit}`).join('　');
    } else {
      document.getElementById('completeUnits').textContent = '';
    }
  } else {
    document.getElementById('completeWord').textContent = item.emoji + ' ' + item.word;
    document.getElementById('completeUnits').textContent = '';
  }

  document.getElementById('completeMsg').classList.add('show');
}

function nextChar() {
  document.getElementById('completeMsg').classList.remove('show');
  selectChar((currentIdx + 1) % currentData().length);
}

// ===== 音声 =====
function speak(text, lang) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang || 'ja-JP'; u.rate = 0.78; u.pitch = 1.15;
  speechSynthesis.speak(u);
}

function speakNum(item) {
  speechSynthesis.cancel();
  // まず数字の読み
  const u1 = new SpeechSynthesisUtterance(item.read);
  u1.lang = 'ja-JP'; u1.rate = 0.78; u1.pitch = 1.15;
  speechSynthesis.speak(u1);
  // 単位読み上げ
  if (item.units && item.units.length > 0) {
    item.units.forEach((unit, i) => {
      const u2 = new SpeechSynthesisUtterance(`${item.unitRead}${unit.unit}の${unit.item}`);
      u2.lang = 'ja-JP'; u2.rate = 0.78; u2.pitch = 1.1;
      speechSynthesis.speak(u2);
    });
  }
}

function speakAlpha(item) {
  speechSynthesis.cancel();
  // 英語で発音
  const u1 = new SpeechSynthesisUtterance(item.soundText);
  u1.lang = 'en-US'; u1.rate = 0.75; u1.pitch = 1.2;
  speechSynthesis.speak(u1);
  // 日本語でも続けて
  setTimeout(() => {
    const u2 = new SpeechSynthesisUtterance(item.read);
    u2.lang = 'ja-JP'; u2.rate = 0.78; u2.pitch = 1.1;
    speechSynthesis.speak(u2);
  }, 1200);
}

// ===== エフェクト =====
function showSparkle() {
  const sc = document.getElementById('sparkleCanvas');
  const sctx = sc.getContext('2d');
  sctx.clearRect(0, 0, sc.width, sc.height);
  const cx = sc.width/2, cy = sc.height/2;
  const ems = ['✨','⭐','💫','🌟','💕'];
  for (let i = 0; i < 12; i++) {
    const a = (i/12)*Math.PI*2;
    const r = sc.width*0.3 + Math.random()*sc.width*0.1;
    sctx.font = `${sc.width*0.08}px serif`;
    sctx.fillText(ems[Math.floor(Math.random()*ems.length)], cx+Math.cos(a)*r, cy+Math.sin(a)*r);
  }
  sc.classList.add('show');
  setTimeout(() => { sc.classList.remove('show'); sctx.clearRect(0,0,sc.width,sc.height); }, 1600);
}

function launchParticles() {
  const ems = ['✨','⭐','💫','🌸','💕','🎀','💎'];
  for (let i = 0; i < 15; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'particle';
      el.textContent = ems[Math.floor(Math.random()*ems.length)];
      el.style.cssText = `left:${20+Math.random()*60}vw;top:${25+Math.random()*45}vh;font-size:${1+Math.random()}rem;`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1600);
    }, i*70);
  }
}

// ===== 背景 =====
function createBgDeco() {
  const bg = document.getElementById('bgDeco');
  const ems = ['⭐','🌸','💫','✨','🌟','💕','🎀','💎'];
  for (let i = 0; i < 20; i++) {
    const el = document.createElement('div');
    el.className = 'star';
    el.textContent = ems[Math.floor(Math.random()*ems.length)];
    el.style.cssText = `left:${Math.random()*100}vw;top:${Math.random()*100}vh;animation-delay:${Math.random()*3}s;font-size:${0.7+Math.random()*0.9}rem;`;
    bg.appendChild(el);
  }
}

// ===== イベント =====
canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', moveDraw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseleave', endDraw);
canvas.addEventListener('touchstart', startDraw, {passive:false});
canvas.addEventListener('touchmove', moveDraw, {passive:false});
canvas.addEventListener('touchend', endDraw, {passive:false});
window.addEventListener('resize', resizeCanvas);

// 初期化
createBgDeco();
buildNav();
resizeCanvas();
updateGuide();
</script>
</body>
</html>
